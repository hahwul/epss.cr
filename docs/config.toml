# =============================================================================
# Site Configuration
# =============================================================================

title = "epss.cr"
description = "A Crystal implementation of the Exploit Prediction Scoring System (EPSS)"
base_url = "https://epss.cr.hahwul.com"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "github"
use_cdn = true

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

# =============================================================================
# Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = []

# =============================================================================
# LLMs.txt
# =============================================================================

[llms]
enabled = true
filename = "llms.txt"
instructions = "This is the documentation for epss.cr, a Crystal library that consumes the FIRST EPSS REST API and daily CSV feed, exposing typed Score and Band value objects with JSON round-trip and time-series flattening."
full_enabled = false
full_filename = "llms-full.txt"

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = false

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false
per_page = 10

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = false
sitemap = false

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = false

# =============================================================================
# OG Image Auto-generation
# =============================================================================

[og.auto_image]
enabled = true
